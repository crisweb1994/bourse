name: Docker image

# PRs verify the image without publishing. Main publishes edge + sha tags.
# Release Please calls this workflow with a version to publish stable tags.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/docker.yml'
      - 'Dockerfile'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/docker.yml'
      - 'Dockerfile'
      - 'docker/**'
      - 'docker-compose.yml'
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_call:
    inputs:
      release_version:
        description: SemVer without the v prefix
        required: true
        type: string

concurrency:
  group: docker-${{ github.ref }}-${{ inputs.release_version || 'continuous' }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Resolve build metadata
        id: build
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [ -n "$RELEASE_VERSION" ]; then
            version="$RELEASE_VERSION"
          else
            version="0.0.0-dev+${GITHUB_SHA::7}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=sha,prefix=sha-,format=short,enable=${{ github.event_name == 'push' && inputs.release_version == '' }}
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && inputs.release_version == '' }}
            type=semver,value=${{ inputs.release_version }},pattern={{version}},enable=${{ inputs.release_version != '' }}
            type=semver,value=${{ inputs.release_version }},pattern={{major}}.{{minor}},enable=${{ inputs.release_version != '' }}
            type=semver,value=${{ inputs.release_version }},pattern={{major}},enable=${{ inputs.release_version != '' }}
            type=raw,value=latest,enable=${{ inputs.release_version != '' }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: bourse
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001' }}
            NEXT_PUBLIC_AUTH_REQUIRED=${{ vars.NEXT_PUBLIC_AUTH_REQUIRED || 'false' }}
            APP_VERSION=${{ steps.build.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.build.outputs.built_at }}
          cache-from: type=gha,scope=bourse
          cache-to: type=gha,scope=bourse,mode=max
